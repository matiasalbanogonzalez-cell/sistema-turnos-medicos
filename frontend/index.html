<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Turnos Médicos</title>

    <link rel="stylesheet" href="./css/styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        🏥

        <h2>Turnos Médicos</h2>

    </div>

    <ul>

    <li class="active" onclick="window.location.href='index.html'">
        <i class="bi bi-house-door"></i>
        Dashboard
    </li>

    <li onclick="window.location.href='turnos.html'">
        <i class="bi bi-calendar2-check"></i>
        Mis Turnos
    </li>

    <li onclick="window.location.href='nuevo-turno.html'">
        <i class="bi bi-calendar-plus"></i>
        Sacar Turno
    </li>

    <li onclick="window.location.href='profesionales.html'">
        <i class="bi bi-person-badge"></i>
        Profesionales
    </li>

    <li onclick="window.location.href='perfil.html'">
        <i class="bi bi-person-circle"></i>
        Perfil
    </li>

    <li onclick="logout()">
        <i class="bi bi-box-arrow-right"></i>
        Salir
    </li>

</ul>

</div>

<div class="main">

    <header>

        <h1>Dashboard</h1>

        <div class="usuario">

            <i class="bi bi-person-circle"></i>

            <span>Administrador</span>

        </div>

    </header>

    <div class="cards">

        <div class="card">

            <h2>Profesionales</h2>

            <p id="cantProfesionales">0</p>

        </div>

        <div class="card">

            <h2>Turnos</h2>

            <p id="cantTurnos">0</p>

        </div>

        <div class="card">

            <h2>Pacientes</h2>

            <p id="cantPacientes">0</p>

        </div>

    </div>

    <div class="tabla">

        <h2>Últimos turnos</h2>

        <table>

            <thead>

                <tr>

                    <th>Paciente</th>

                    <th>Profesional</th>

                    <th>Fecha</th>

                    <th>Estado</th>

                </tr>

            </thead>

            <tbody id="tablaTurnos">

            </tbody>

        </table>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
