<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profesionales - Sistema de Turnos Médicos</title>

    <link rel="stylesheet" href="css/styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        🏥

        <h2>Turnos Médicos</h2>

    </div>

    <ul>

        <li onclick="window.location.href='index.html'">

            <i class="bi bi-house-door"></i>

            Dashboard

        </li>

        <li onclick="window.location.href='turnos.html'">

            <i class="bi bi-calendar2-check"></i>

            Mis Turnos

        </li>

        <li onclick="window.location.href='nuevo-turno.html'">

            <i class="bi bi-calendar-plus"></i>

            Sacar Turno

        </li>

        <li class="active">

            <i class="bi bi-person-badge"></i>

            Profesionales

        </li>

        <li onclick="window.location.href='perfil.html'">

            <i class="bi bi-person-circle"></i>

            Perfil

        </li>

        <li onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>

            Salir

        </li>

    </ul>

</div>

<div class="main">

    <header>

        <h1>👨‍⚕️ Profesionales</h1>

        <div class="usuario">

            <i class="bi bi-person-circle"></i>

            <span id="nombreUsuario">Administrador</span>

        </div>

    </header>

    <div class="tabla">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

            <h2>Listado de Profesionales</h2>

            <button id="btnNuevo">

                ➕ Agregar Profesional

            </button>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>

                    <th>Especialidad</th>

                    <th>Matrícula</th>

                    <th>Consultorio</th>

                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaProfesionales">

            </tbody>

        </table>

    </div>

</div>

<script src="js/profesionales.js"></script>

</body>

</html>
